<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sutra — Riwayat Verifikasi</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.11.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="../../assets/css/style.css">
<link rel="stylesheet" href="../../assets/css/dashboard.css">
<!-- QR Code Library -->
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<!-- jsPDF untuk generate PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  /* QR Code Section */
  .qr-certificate-section {
    background: linear-gradient(135deg, rgba(61,139,94,0.08) 0%, rgba(61,139,94,0.02) 100%);
    border: 1.5px solid rgba(61,139,94,0.25);
    border-radius: 14px;
    padding: 18px;
    margin-top: 16px;
    text-align: center;
  }
  .qr-title {
    font-size: .8rem;
    font-weight: 700;
    color: var(--leaf);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  #qr-canvas-container {
    display: flex;
    justify-content: center;
    margin-bottom: 14px;
  }
  #qr-canvas-container canvas,
  #qr-canvas-container img {
    border-radius: 10px;
    padding: 10px;
    background: #fff;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    border: 1px solid var(--border);
  }
  .qr-info-text {
    font-size: .73rem;
    color: var(--text-light);
    margin-bottom: 14px;
    line-height: 1.5;
  }
  .btn-download-cert {
    background: linear-gradient(135deg, var(--leaf) 0%, #2d8a5e 100%);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 10px 22px;
    font-size: .85rem;
    font-weight: 600;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: all .2s;
    box-shadow: 0 4px 14px rgba(61,139,94,0.3);
  }
  .btn-download-cert:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(61,139,94,0.4);
  }
  .btn-download-qr {
    background: rgba(61,139,94,0.1);
    color: var(--leaf);
    border: 1.5px solid rgba(61,139,94,0.3);
    border-radius: 10px;
    padding: 8px 16px;
    font-size: .8rem;
    font-weight: 600;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: all .2s;
    margin-right: 8px;
  }
  .btn-download-qr:hover { background: rgba(61,139,94,0.15); }

  /* Catatan Penolakan */
  .catatan-penolakan-box {
    background: rgba(220,38,38,0.06);
    border: 1.5px solid rgba(220,38,38,0.2);
    border-radius: 12px;
    padding: 14px 16px;
    margin-top: 14px;
  }
  .catatan-penolakan-title {
    font-size: .75rem;
    font-weight: 700;
    color: var(--rose);
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 8px;
  }
  .catatan-penolakan-text {
    font-size: .85rem;
    color: var(--text-dark);
    line-height: 1.6;
  }

  .foto-panen {
    width: 100%;
    border-radius: 12px;
    max-height: 200px;
    object-fit: cover;
    border: 1px solid var(--border);
    margin-bottom: 12px;
  }

  /* Sertifikat PDF Preview (hidden canvas for generation) */
  #cert-hidden { display: none; }
</style>
</head>
<body class="dashboard-layout">

<div class="main">
  <main class="content">

    <div class="page-header">
      <div class="page-header-text">
        <h1><i class="ti ti-clipboard-list"></i> Riwayat Verifikasi</h1>
        <p>Semua pengajuan panen Anda tersimpan di sini</p>
      </div>
      <a href="input-panen.html" class="btn btn-primary">
        <i class="ti ti-plus"></i> Input Panen Baru
      </a>
    </div>

    <!-- SUMMARY MINI CARDS -->
    <div class="quick-info" style="margin-bottom:20px">
      <div class="qi-item">
        <div class="qi-label">Total Pengajuan</div>
        <div class="qi-val" id="stat-total" style="color:var(--text-dark)">0</div>
      </div>
      <div class="qi-item">
        <div class="qi-label">Disetujui</div>
        <div class="qi-val" id="stat-verified" style="color:var(--leaf)">0</div>
      </div>
      <div class="qi-item">
        <div class="qi-label">Pending</div>
        <div class="qi-val" id="stat-pending" style="color:var(--amber)">0</div>
      </div>
      <div class="qi-item">
        <div class="qi-label">Ditolak</div>
        <div class="qi-val" id="stat-rejected" style="color:var(--rose)">0</div>
      </div>
    </div>

    <!-- FILTER BAR -->
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">
        <i class="ti ti-list"></i> Semua
      </button>
      <button class="filter-btn" data-filter="pending">
        <i class="ti ti-clock"></i> Pending
      </button>
      <button class="filter-btn" data-filter="approved">
        <i class="ti ti-circle-check"></i> Disetujui
      </button>
      <button class="filter-btn" data-filter="rejected">
        <i class="ti ti-circle-x"></i> Ditolak
      </button>
      <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
        <input id="filter-bulan" type="month" class="form-input" style="padding:7px 12px;font-size:.8rem;width:auto" onchange="renderTable(document.querySelector('.filter-btn.active')?.dataset?.filter || 'all')" />
      </div>
    </div>

    <!-- TABLE -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID Pengajuan</th>
            <th>Tanggal</th>
            <th>Komoditas</th>
            <th>Jumlah</th>
            <th>Lokasi</th>
            <th>Status</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody id="riwayat-tbody"></tbody>
      </table>
    </div>

  </main>
</div>

<!-- MODAL DETAIL -->
<div class="modal-overlay" id="modal-detail">
  <div class="modal" style="width:580px">
    <div class="modal-header">
      <div class="modal-title"><i class="ti ti-file-description"></i> Detail Verifikasi</div>
      <button class="modal-close" onclick="closeModal('modal-detail')"><i class="ti ti-x"></i></button>
    </div>
    <div id="modal-detail-body"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-detail')">Tutup</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>
<script src="../../assets/js/main.js"></script>
<script src="../../assets/js/sidebar-petani.js"></script>
<script>
  renderSidebar('riwayat');
  renderTopbar('Riwayat Verifikasi', 'Sutra › Riwayat');

  let riwayatData = [];
  const { jsPDF } = window.jspdf;

  const komoditasIcons = { 
    Padi:'ti-wheat', Jagung:'ti-plant', Singkong:'ti-plant-2', 
    Kedelai:'ti-seed', Cabai:'ti-pepper', default:'ti-plant' 
  };

  const statusBadge = {
    pending:  `<span class="badge pending"><i class="ti ti-clock"></i> Pending</span>`,
    verified: `<span class="badge approved"><i class="ti ti-circle-check"></i> Disetujui</span>`,
    rejected: `<span class="badge rejected"><i class="ti ti-circle-x"></i> Ditolak</span>`,
  };

  async function loadData() {
    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = '../../index.html';
        return;
    }

    try {
      const response = await fetch('http://localhost:3000/api/harvests/petani', {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const data = await response.json();
      if (response.ok) {
        riwayatData = data.data;
        renderTable('all');
        updateSummary();
      } else {
        showToast(data.message || 'Gagal memuat data riwayat', 'error');
      }
    } catch (error) {
      console.error('Error load riwayat:', error);
      showToast('Koneksi ke server gagal', 'error');
    }
  }

  function updateSummary() {
    document.getElementById('stat-total').textContent = riwayatData.length;
    document.getElementById('stat-verified').textContent = riwayatData.filter(r => r.status === 'verified').length;
    document.getElementById('stat-pending').textContent = riwayatData.filter(r => r.status === 'pending').length;
    document.getElementById('stat-rejected').textContent = riwayatData.filter(r => r.status === 'rejected').length;
  }

  function renderTable(filter = 'all') {
    const filterBulan = document.getElementById('filter-bulan').value;
    const rows = riwayatData.filter(r => {
        let fStatus = r.status === 'verified' ? 'approved' : r.status;
        let matchStatus = filter === 'all' || fStatus === filter;
        let matchBulan = true;
        if (filterBulan && r.tanggal_panen) {
            const dateObj = new Date(r.tanggal_panen);
            const rowBulan = `${dateObj.getFullYear()}-${String(dateObj.getMonth()+1).padStart(2,'0')}`;
            matchBulan = rowBulan === filterBulan;
        }
        return matchStatus && matchBulan;
    });
    
    const tbody = document.getElementById('riwayat-tbody');
    if (rows.length === 0) {
      tbody.innerHTML = `<tr><td colspan="7">
        <div class="empty-state">
          <i class="ti ti-inbox"></i>
          <h3>Tidak ada data</h3>
          <p>Belum ada pengajuan dengan filter ini</p>
        </div>
      </td></tr>`;
      return;
    }
    tbody.innerHTML = rows.map((r, i) => {
      const icon = komoditasIcons[r.komoditas] || komoditasIcons.default;
      const tgl = new Date(r.tanggal_panen).toLocaleDateString('id-ID');
      const realIdx = riwayatData.indexOf(r);
      return `<tr>
        <td style="font-size:.75rem;color:var(--text-light);font-weight:600;font-family:monospace">AGC-${r.id.toString().padStart(4, '0')}</td>
        <td style="color:var(--text-mid)">${tgl}</td>
        <td><span style="display:flex;align-items:center;gap:6px"><i class="ti ${icon}" style="color:var(--leaf)"></i>${r.komoditas}</span></td>
        <td><strong>${r.jumlah} ${r.satuan}</strong></td>
        <td style="color:var(--text-mid)">${r.lokasi}</td>
        <td>${statusBadge[r.status] || statusBadge['pending']}</td>
        <td>
          <button class="action-btn" onclick="openDetail(${realIdx})">
            <i class="ti ti-eye"></i> Detail
          </button>
          ${r.status === 'verified' ? `
          <button class="action-btn btn-approve" onclick="openDetail(${realIdx})" title="Lihat QR & Sertifikat" style="background:rgba(61,139,94,.1);color:var(--leaf);border:1.5px solid rgba(61,139,94,.3)">
            <i class="ti ti-qrcode"></i>
          </button>` : ''}
        </td>
      </tr>`;
    }).join('');
  }

  // =============================================
  // GENERATE QR CODE
  // =============================================
  function generateQRCode(r, containerId) {
    const container = document.getElementById(containerId);
    if (!container) return;
    container.innerHTML = '';
    
    // Data yang di-encode ke QR
    const qrText = [
      `SUTRA AGRICHAIN`,
      `==================`,
      `ID     : AGC-${r.id.toString().padStart(4,'0')}`,
      `Petani : ${r.nama_petani || getUserNama()}`,
      `Komoditas: ${r.komoditas}`,
      `Jumlah : ${r.jumlah} ${r.satuan}`,
      `Lokasi : ${r.lokasi}`,
      `Tgl Panen: ${new Date(r.tanggal_panen).toLocaleDateString('id-ID')}`,
      `Status : TERVERIFIKASI`,
      `==================`,
      `Terverifikasi oleh Sistem Sutra`
    ].join('\n');

    new QRCode(container, {
      text: qrText,
      width: 160,
      height: 160,
      colorDark: '#1a3a2a',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });
  }

  function getUserNama() {
    try {
      const user = JSON.parse(localStorage.getItem('user') || '{}');
      return user.nama || 'Petani';
    } catch { return 'Petani'; }
  }

  // =============================================
  // GENERATE PDF SERTIFIKAT
  // =============================================
  function downloadCertificate(r) {
    const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a5' });
    const W = doc.internal.pageSize.getWidth();
    const H = doc.internal.pageSize.getHeight();

    // Background
    doc.setFillColor(245, 250, 247);
    doc.rect(0, 0, W, H, 'F');

    // Border dekoratif
    doc.setDrawColor(61, 139, 94);
    doc.setLineWidth(2);
    doc.rect(6, 6, W-12, H-12);
    doc.setLineWidth(0.5);
    doc.rect(9, 9, W-18, H-18);

    // Header hijau
    doc.setFillColor(61, 139, 94);
    doc.rect(0, 0, W, 28, 'F');

    // Logo teks
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(18);
    doc.setFont('helvetica', 'bold');
    doc.text('SUTRA', 14, 12);
    doc.setFontSize(8);
    doc.setFont('helvetica', 'normal');
    doc.text('Sistem Informasi Pertanian Terpadu', 14, 18);

    // Judul sertifikat
    doc.setFontSize(11);
    doc.setFont('helvetica', 'bold');
    doc.text('SERTIFIKAT VERIFIKASI PANEN', W/2, 22, { align: 'center' });

    // ID Sertifikat
    doc.setTextColor(100, 100, 100);
    doc.setFontSize(7);
    doc.setFont('helvetica', 'normal');
    doc.text(`No: AGC-${r.id.toString().padStart(4,'0')} | Diterbitkan: ${new Date().toLocaleDateString('id-ID')}`, W-14, 37, { align: 'right' });

    // Subheading
    doc.setTextColor(61, 139, 94);
    doc.setFontSize(9);
    doc.setFont('helvetica', 'bold');
    doc.text('MENYATAKAN BAHWA', W/2, 42, { align: 'center' });

    // Nama Petani besar
    const namaPetani = r.nama_petani || getUserNama();
    doc.setTextColor(20, 40, 30);
    doc.setFontSize(16);
    doc.setFont('helvetica', 'bold');
    doc.text(namaPetani.toUpperCase(), W/2, 52, { align: 'center' });

    // Garis bawah nama
    const namaWidth = doc.getTextWidth(namaPetani.toUpperCase());
    doc.setDrawColor(61, 139, 94);
    doc.setLineWidth(0.8);
    doc.line(W/2 - namaWidth/2, 54, W/2 + namaWidth/2, 54);

    // Kalimat
    doc.setTextColor(60, 60, 60);
    doc.setFontSize(8.5);
    doc.setFont('helvetica', 'normal');
    doc.text('Telah berhasil melakukan panen dan telah diverifikasi oleh ketua kelompok tani', W/2, 61, { align: 'center' });

    // Data Panen Box
    doc.setFillColor(235, 248, 240);
    doc.setDrawColor(61, 139, 94);
    doc.setLineWidth(0.3);
    doc.roundedRect(14, 65, W-28, 42, 3, 3, 'FD');

    doc.setTextColor(61, 139, 94);
    doc.setFontSize(8);
    doc.setFont('helvetica', 'bold');
    doc.text('DATA HASIL PANEN', W/2, 72, { align: 'center' });

    const tglPanen = new Date(r.tanggal_panen).toLocaleDateString('id-ID', { day: '2-digit', month: 'long', year: 'numeric' });
    const dataItems = [
      ['Komoditas', r.komoditas],
      ['Jumlah Panen', `${r.jumlah} ${r.satuan}`],
      ['Lokasi', r.lokasi],
      ['Tanggal Panen', tglPanen],
      ['Luas Lahan', r.luas ? `${r.luas} Ha` : '-'],
      ['Kualitas', r.kualitas || '-'],
    ];

    let col1X = 18, col2X = W/2 + 4;
    let rowY = 78;
    dataItems.forEach((item, idx) => {
      const x = idx % 2 === 0 ? col1X : col2X;
      if (idx % 2 === 0 && idx > 0) rowY += 10;
      doc.setTextColor(100, 100, 100);
      doc.setFontSize(7);
      doc.setFont('helvetica', 'normal');
      doc.text(item[0] + ':', x, rowY);
      doc.setTextColor(20, 40, 30);
      doc.setFontSize(8);
      doc.setFont('helvetica', 'bold');
      doc.text(item[1], x, rowY + 4);
    });

    // Footer
    doc.setFillColor(61, 139, 94);
    doc.rect(0, H-14, W, 14, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(7);
    doc.setFont('helvetica', 'normal');
    doc.text('Sertifikat ini diterbitkan secara otomatis oleh Sistem Sutra | sutra-agrichain.id', W/2, H-7, { align: 'center' });

    // Cap TERVERIFIKASI
    doc.setTextColor(61, 139, 94);
    doc.setFontSize(22);
    doc.setFont('helvetica', 'bold');
    doc.setGState(new doc.GState({ opacity: 0.08 }));
    doc.text('TERVERIFIKASI', W/2, H/2 + 10, { align: 'center', angle: 30 });
    doc.setGState(new doc.GState({ opacity: 1 }));

    const namaFile = `Sertifikat-AGC-${r.id.toString().padStart(4,'0')}-${namaPetani.replace(/\s+/g,'-')}.pdf`;
    doc.save(namaFile);
    showToast('Sertifikat berhasil diunduh!', 'success');
  }

  // =============================================
  // DOWNLOAD QR CODE
  // =============================================
  function downloadQR(r) {
    const container = document.getElementById('qr-canvas-container');
    const canvas = container.querySelector('canvas');
    if (!canvas) {
        showToast('QR Code belum siap, coba lagi', 'error');
        return;
    }
    const link = document.createElement('a');
    link.href = canvas.toDataURL('image/png');
    link.download = `QR-AGC-${r.id.toString().padStart(4,'0')}.png`;
    link.click();
    showToast('QR Code berhasil diunduh!', 'success');
  }

  // =============================================
  // OPEN DETAIL MODAL
  // =============================================
  function openDetail(idx) {
    const r = riwayatData[idx];
    const tgl = new Date(r.tanggal_panen).toLocaleDateString('id-ID', { day: '2-digit', month: 'long', year: 'numeric' });
    
    // Foto
    const fotoHtml = r.foto 
        ? `<img src="http://localhost:3000/uploads/${r.foto}" alt="Bukti Panen" class="foto-panen">`
        : '';

    // Catatan penolakan
    const catatanPenolakanHtml = (r.status === 'rejected' && r.catatan_ketua)
        ? `<div class="catatan-penolakan-box">
             <div class="catatan-penolakan-title"><i class="ti ti-alert-triangle"></i> Alasan Penolakan dari Ketua</div>
             <div class="catatan-penolakan-text">${r.catatan_ketua}</div>
           </div>`
        : '';

    // QR + Sertifikat (hanya jika verified)
    const qrSertifikatHtml = r.status === 'verified' 
        ? `<div class="qr-certificate-section">
             <div class="qr-title"><i class="ti ti-qrcode"></i> QR Code & Sertifikat Panen</div>
             <div id="qr-canvas-container"></div>
             <div class="qr-info-text">
               Scan QR code di atas untuk melihat detail data panen<br>
               <strong>AGC-${r.id.toString().padStart(4,'0')}</strong> — ${r.komoditas} ${r.jumlah} ${r.satuan}
             </div>
             <button class="btn-download-qr" onclick="downloadQR(riwayatData[${idx}])">
               <i class="ti ti-download"></i> Unduh QR
             </button>
             <button class="btn-download-cert" onclick="downloadCertificate(riwayatData[${idx}])">
               <i class="ti ti-file-certificate"></i> Unduh Sertifikat PDF
             </button>
           </div>` 
        : '';

    document.getElementById('modal-detail-body').innerHTML = `
      <div class="quick-info" style="grid-template-columns:1fr 1fr;margin-bottom:16px">
        <div class="qi-item"><div class="qi-label">ID Pengajuan</div><div class="qi-val" style="font-family:monospace">AGC-${r.id.toString().padStart(4, '0')}</div></div>
        <div class="qi-item"><div class="qi-label">Tanggal Panen</div><div class="qi-val">${tgl}</div></div>
        <div class="qi-item"><div class="qi-label">Komoditas</div><div class="qi-val">${r.komoditas}</div></div>
        <div class="qi-item"><div class="qi-label">Jumlah</div><div class="qi-val">${r.jumlah} ${r.satuan}</div></div>
        <div class="qi-item"><div class="qi-label">Lokasi</div><div class="qi-val">${r.lokasi}</div></div>
        <div class="qi-item"><div class="qi-label">Luas Lahan</div><div class="qi-val">${r.luas ? r.luas + ' Ha' : '-'}</div></div>
      </div>

      ${fotoHtml ? `
      <div style="margin-bottom:14px">
        <div style="font-size:.79rem;font-weight:600;color:var(--text-mid);margin-bottom:8px;display:flex;align-items:center;gap:5px">
          <i class="ti ti-camera" style="color:var(--leaf)"></i> Foto Bukti Panen
        </div>
        ${fotoHtml}
      </div>` : ''}

      ${r.catatan ? `
      <div style="background:var(--cream);border-radius:10px;padding:12px 14px;margin-bottom:14px;border:1px solid var(--border)">
        <div style="font-size:.72rem;color:var(--text-light);margin-bottom:4px;display:flex;align-items:center;gap:4px">
          <i class="ti ti-notes" style="font-size:13px"></i> Catatan Panen
        </div>
        <div style="font-size:.84rem;color:var(--text-dark);line-height:1.5">${r.catatan}</div>
      </div>` : ''}

      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
        <span style="font-size:.78rem;color:var(--text-light)">Status:</span>
        ${statusBadge[r.status] || statusBadge['pending']}
      </div>

      ${catatanPenolakanHtml}
      ${qrSertifikatHtml}
    `;

    openModal('modal-detail');

    // Generate QR setelah modal terbuka
    if (r.status === 'verified') {
      setTimeout(() => generateQRCode(r, 'qr-canvas-container'), 100);
    }
  }

  initFilterBtns('.filter-btn', renderTable);
  loadData();
</script>
</body>
</html>
