<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sutra — Tracking Panen</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.11.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="../../assets/css/style.css">
<link rel="stylesheet" href="../../assets/css/dashboard.css">
</head>
<body class="dashboard-layout">

<div class="main">
  <main class="content">

    <div class="page-header">
      <div class="page-header-text">
        <h1><i class="ti ti-map-pin"></i> Tracking Panen</h1>
        <p>Pantau progres verifikasi setiap pengajuan panen Anda</p>
      </div>
      <a href="input-panen.html" class="btn btn-primary">
        <i class="ti ti-plus"></i> Input Panen Baru
      </a>
    </div>

    <div id="tracking-container">
      <!-- Loading state or dynamic content will go here -->
    </div>

  </main>
</div>

<div class="toast-container" id="toast-container"></div>
<script src="../../assets/js/main.js"></script>
<script src="../../assets/js/sidebar-petani.js"></script>
<script>
  renderSidebar('tracking');
  renderTopbar('Tracking Panen', 'Sutra › Tracking');

  const komoditasIcons = { Padi:'ti-wheat', Jagung:'ti-plant', Singkong:'ti-plant-2', Kedelai:'ti-seed', Cabai:'ti-pepper', default:'ti-plant' };

  async function loadTrackingData() {
    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = '../../index.html';
        return;
    }

    try {
      const response = await fetch('http://localhost:3000/api/harvests/petani', {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const data = await response.json();
      if (response.ok) {
        renderTrackingCards(data.data);
      } else {
        showToast(data.message || 'Gagal memuat data tracking', 'error');
      }
    } catch (error) {
      console.error('Error load tracking:', error);
      showToast('Koneksi ke server gagal', 'error');
    }
  }

  function renderTrackingCards(harvests) {
    const container = document.getElementById('tracking-container');
    
    if (!harvests || harvests.length === 0) {
      container.innerHTML = `
        <div style="text-align:center; padding: 40px; background:#fff; border-radius:10px; border:1px solid var(--border)">
          <i class="ti ti-map-pin" style="font-size:40px; color:var(--text-light); margin-bottom:10px"></i>
          <h3 style="color:var(--text-dark)">Belum Ada Pengajuan</h3>
          <p style="color:var(--text-light); margin-top:5px">Anda belum memiliki riwayat pengajuan panen untuk dilacak.</p>
        </div>
      `;
      return;
    }

    container.innerHTML = harvests.map((h) => {
      const icon = komoditasIcons[h.komoditas] || komoditasIcons.default;
      const tgl = new Date(h.tanggal_panen).toLocaleDateString('id-ID', {day:'numeric', month:'short', year:'numeric'});
      const idFormatted = 'AGC-' + h.id.toString().padStart(4, '0');
      const createdAt = new Date(h.created_at).toLocaleString('id-ID', {day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'});
      const updatedAt = new Date(h.updated_at).toLocaleString('id-ID', {day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'});
      
      let statusBadge, timelineHTML, tipBox = '';
      
      if (h.status === 'verified') {
        statusBadge = `<span class="badge approved"><i class="ti ti-circle-check"></i> Disetujui</span>`;
        timelineHTML = `
          <div class="timeline-item">
            <div class="timeline-dot done"><i class="ti ti-check"></i></div>
            <div class="timeline-content">
              <div class="timeline-title">Input oleh Petani</div>
              <div class="timeline-desc">Data panen berhasil diunggah</div>
            </div>
            <div class="timeline-time">${createdAt}</div>
          </div>
          <div class="timeline-item">
            <div class="timeline-dot done"><i class="ti ti-check"></i></div>
            <div class="timeline-content">
              <div class="timeline-title">Verifikasi Akhir</div>
              <div class="timeline-desc">Disetujui oleh Ketua — semua data valid dan sesuai</div>
            </div>
            <div class="timeline-time">${updatedAt}</div>
          </div>
          <div class="timeline-item">
            <div class="timeline-dot done"><i class="ti ti-check"></i></div>
            <div class="timeline-content">
              <div class="timeline-title">Finalisasi & Sertifikasi</div>
              <div class="timeline-desc">Data panen tercatat dan tersimpan di sistem Sutra</div>
            </div>
            <div class="timeline-time">${updatedAt}</div>
          </div>
        `;
      } else if (h.status === 'rejected') {
        statusBadge = `<span class="badge rejected"><i class="ti ti-circle-x"></i> Ditolak</span>`;
        timelineHTML = `
          <div class="timeline-item">
            <div class="timeline-dot done"><i class="ti ti-check"></i></div>
            <div class="timeline-content">
              <div class="timeline-title">Input oleh Petani</div>
              <div class="timeline-desc">Data panen berhasil diunggah</div>
            </div>
            <div class="timeline-time">${createdAt}</div>
          </div>
          <div class="timeline-item" style="position:relative">
            <div class="timeline-dot" style="background:var(--rose);border-color:var(--rose);color:#fff"><i class="ti ti-x"></i></div>
            <div class="timeline-content">
              <div class="timeline-title" style="color:var(--rose)">Ditolak oleh Ketua</div>
              <div class="timeline-desc">${h.catatan || 'Tidak memenuhi kriteria.'}</div>
            </div>
            <div class="timeline-time">${updatedAt}</div>
          </div>
          <div class="timeline-item">
            <div class="timeline-dot pending"><i class="ti ti-certificate"></i></div>
            <div class="timeline-content">
              <div class="timeline-title muted">Finalisasi & Sertifikasi</div>
              <div class="timeline-desc" style="color:var(--rose);font-size:.75rem">Dibatalkan karena verifikasi ditolak</div>
            </div>
            <div class="timeline-time" style="color:var(--text-light)">—</div>
          </div>
        `;
        tipBox = `
          <div class="tip-box" style="background:var(--rose-light);border:1px solid #f5c4c4;margin-top:14px">
            <i class="ti ti-alert-triangle" style="color:var(--rose);font-size:20px;flex-shrink:0;margin-top:1px"></i>
            <div>
              <strong style="font-size:.83rem;font-weight:600;color:var(--rose);display:block;margin-bottom:3px">Tindakan Diperlukan</strong>
              <p style="font-size:.77rem;color:#b04444;line-height:1.5">Pengajuan ditolak. Silakan periksa catatan dan <a href="input-panen.html" style="color:var(--rose);font-weight:600">input ulang</a> jika diperlukan.</p>
            </div>
          </div>
        `;
      } else { // pending
        statusBadge = `<span class="badge pending"><i class="ti ti-clock"></i> Verifikasi Akhir</span>`;
        timelineHTML = `
          <div class="timeline-item">
            <div class="timeline-dot done"><i class="ti ti-check"></i></div>
            <div class="timeline-content">
              <div class="timeline-title">Input oleh Petani</div>
              <div class="timeline-desc">Data panen berhasil diunggah</div>
            </div>
            <div class="timeline-time">${createdAt}</div>
          </div>
          <div class="timeline-item">
            <div class="timeline-dot active"><i class="ti ti-clock"></i></div>
            <div class="timeline-content">
              <div class="timeline-title">Verifikasi Akhir</div>
              <div class="timeline-desc">Sedang diperiksa oleh Ketua Kelompok Tani</div>
            </div>
            <div class="timeline-time">Menunggu...</div>
          </div>
          <div class="timeline-item">
            <div class="timeline-dot pending"><i class="ti ti-certificate"></i></div>
            <div class="timeline-content">
              <div class="timeline-title muted">Finalisasi & Sertifikasi</div>
              <div class="timeline-desc" style="color:var(--text-light)">Belum diproses</div>
            </div>
            <div class="timeline-time" style="color:var(--text-light)">—</div>
          </div>
        `;
      }

      return `
        <div class="tracking-card">
          <div class="tracking-header">
            <div>
              <div class="tracking-id">Panen ${h.komoditas} — ${h.jumlah} ${h.satuan} <span>· ${idFormatted}</span></div>
              <div style="font-size:.75rem;color:var(--text-light);margin-top:3px;display:flex;align-items:center;gap:4px">
                <i class="ti ti-calendar" style="font-size:12px"></i> Diserahkan: ${tgl}
              </div>
            </div>
            ${statusBadge}
          </div>
          <div class="quick-info">
            <div class="qi-item"><div class="qi-label">Komoditas</div><div class="qi-val"><i class="ti ${icon}" style="color:var(--leaf);font-size:13px"></i> ${h.komoditas}</div></div>
            <div class="qi-item"><div class="qi-label">Jumlah</div><div class="qi-val">${h.jumlah} ${h.satuan}</div></div>
            <div class="qi-item"><div class="qi-label">Lokasi Lahan</div><div class="qi-val">${h.lokasi}</div></div>
            <div class="qi-item"><div class="qi-label">Verifikator</div><div class="qi-val">Ketua Kelompok</div></div>
          </div>
          <div class="timeline">
            ${timelineHTML}
          </div>
          ${tipBox}
        </div>
      `;
    }).join('');
  }

  loadTrackingData();
</script>
</body>
</html>
