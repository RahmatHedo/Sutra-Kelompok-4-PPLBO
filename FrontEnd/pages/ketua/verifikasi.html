<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sutra — Verifikasi Panen</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.11.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="../../assets/css/style.css">
<link rel="stylesheet" href="../../assets/css/dashboard.css">
<style>
  .verif-action-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .btn-approve {
    background: rgba(61,139,94,0.1);
    color: var(--leaf);
    border: 1.5px solid rgba(61,139,94,0.3);
  }
  .btn-approve:hover { background: var(--leaf); color: #fff; border-color: var(--leaf); }
  .btn-reject {
    background: var(--rose-light);
    color: var(--rose);
    border: 1.5px solid #f5c4c4;
  }
  .btn-reject:hover { background: var(--rose); color: #fff; }

  .foto-panen {
    width: 100%;
    border-radius: 12px;
    max-height: 220px;
    object-fit: cover;
    border: 1px solid var(--border);
    cursor: zoom-in;
    transition: transform 0.2s;
  }
  .foto-panen:hover { transform: scale(1.02); }
  .photo-placeholder {
    background: var(--cream);
    border: 1px dashed var(--border);
    border-radius: 12px;
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 6px;
    color: var(--text-light);
  }
  .photo-placeholder i { font-size: 28px; }

  /* Modal Tolak */
  #modal-tolak .modal { width: 460px; }
  .tolak-box {
    background: rgba(220,38,38,0.06);
    border: 1.5px solid rgba(220,38,38,0.18);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 14px;
  }
  .tolak-box-title {
    font-size: .78rem;
    font-weight: 700;
    color: var(--rose);
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 10px;
  }
  #catatan-ketua-input {
    width: 100%;
    min-height: 100px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    padding: 10px 12px;
    font-size: .85rem;
    font-family: inherit;
    resize: vertical;
    background: var(--card);
    color: var(--text-dark);
    transition: border-color .2s;
    box-sizing: border-box;
  }
  #catatan-ketua-input:focus {
    outline: none;
    border-color: var(--rose);
  }
  .char-count { font-size:.71rem; color:var(--text-light); text-align:right; margin-top:4px; }
</style>
</head>
<body class="dashboard-layout">

<div class="main">
  <main class="content">

    <div class="page-header">
      <div class="page-header-text">
        <h1><i class="ti ti-shield-check"></i> Verifikasi Panen</h1>
        <p id="verif-subtitle">Memuat data pengajuan...</p>
      </div>
    </div>

    <!-- FILTER -->
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all"><i class="ti ti-list"></i> Semua</button>
      <button class="filter-btn" data-filter="pending"><i class="ti ti-clock"></i> Menunggu</button>
      <button class="filter-btn" data-filter="approved"><i class="ti ti-circle-check"></i> Disetujui</button>
      <button class="filter-btn" data-filter="rejected"><i class="ti ti-circle-x"></i> Ditolak</button>
      <div style="margin-left:auto;display:flex;gap:8px">
        <select id="filter-petani" class="form-input" style="width:auto;padding:7px 12px;font-size:.8rem" onchange="renderTable(document.querySelector('.filter-btn.active')?.dataset?.filter || 'all')">
          <option value="all">Semua Petani</option>
        </select>
        <input id="filter-bulan" type="month" class="form-input" style="padding:7px 12px;font-size:.8rem;width:auto" onchange="renderTable(document.querySelector('.filter-btn.active')?.dataset?.filter || 'all')" />
      </div>
    </div>

    <!-- TABLE -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th><th>Nama Petani</th><th>Tanggal</th><th>Komoditas</th><th>Jumlah</th><th>Status</th><th>Aksi</th>
          </tr>
        </thead>
        <tbody id="verif-tbody"></tbody>
      </table>
    </div>

  </main>
</div>

<!-- MODAL DETAIL VERIFIKASI -->
<div class="modal-overlay" id="modal-verif">
  <div class="modal" style="width:600px">
    <div class="modal-header">
      <div class="modal-title"><i class="ti ti-shield-check"></i> Detail Verifikasi</div>
      <button class="modal-close" onclick="closeModal('modal-verif')"><i class="ti ti-x"></i></button>
    </div>
    <div id="modal-verif-body"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-verif')">Tutup</button>
    </div>
  </div>
</div>

<!-- MODAL KONFIRMASI TOLAK + CATATAN -->
<div class="modal-overlay" id="modal-tolak">
  <div class="modal" style="width:460px">
    <div class="modal-header">
      <div class="modal-title" style="color:var(--rose)"><i class="ti ti-circle-x"></i> Tolak Pengajuan</div>
      <button class="modal-close" onclick="closeModal('modal-tolak')"><i class="ti ti-x"></i></button>
    </div>
    <div style="padding:20px">
      <div class="tolak-box">
        <div class="tolak-box-title"><i class="ti ti-alert-triangle"></i> Alasan Penolakan (Wajib Diisi)</div>
        <textarea id="catatan-ketua-input" placeholder="Contoh: Foto bukti panen tidak jelas, data jumlah tidak sesuai laporan lapangan, dsb..." oninput="updateCharCount()"></textarea>
        <div class="char-count"><span id="char-count">0</span> / 500 karakter</div>
      </div>
      <p style="font-size:.8rem;color:var(--text-mid);margin:0">Catatan ini akan dilihat oleh petani sebagai alasan penolakan.</p>
    </div>
    <div class="modal-footer" style="gap:10px">
      <button class="btn btn-secondary" onclick="closeModal('modal-tolak')">Batal</button>
      <button class="btn btn-sm btn-reject" id="btn-konfirmasi-tolak" onclick="konfirmasiTolak()">
        <i class="ti ti-circle-x"></i> Konfirmasi Tolak
      </button>
    </div>
  </div>
</div>

<!-- MODAL ZOOM FOTO -->
<div class="modal-overlay" id="modal-foto" onclick="closeModal('modal-foto')">
  <div style="max-width:90vw;max-height:90vh;display:flex;align-items:center;justify-content:center">
    <img id="zoom-foto" src="" alt="Foto Panen" style="max-width:90vw;max-height:85vh;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.5)">
  </div>
</div>

<div class="toast-container" id="toast-container"></div>
<script src="../../assets/js/main.js"></script>
<script src="../../assets/js/sidebar-ketua.js"></script>
<script>
  renderSidebar('verifikasi');
  renderTopbar('Verifikasi Panen', 'Sutra › Verifikasi');

  let verifData = [];
  let pendingRejectId = null;

  const statusBadge = {
    pending:  `<span class="badge pending"><i class="ti ti-clock"></i> Menunggu</span>`,
    verified: `<span class="badge approved"><i class="ti ti-circle-check"></i> Disetujui</span>`,
    rejected: `<span class="badge rejected"><i class="ti ti-circle-x"></i> Ditolak</span>`,
  };

  async function loadVerifData() {
    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = '../../index.html';
        return;
    }
    
    try {
        const response = await fetch('http://localhost:3000/api/harvests/ketua', {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await response.json();
        
        if (response.ok) {
            verifData = data.data;
            populatePetaniDropdown();
            renderTable(document.querySelector('.filter-btn.active')?.dataset?.filter || 'all');
            const pendingCount = verifData.filter(r => r.status === 'pending').length;
            document.getElementById('verif-subtitle').textContent = pendingCount > 0
                ? `${pendingCount} pengajuan menunggu verifikasi Anda`
                : 'Tidak ada pengajuan yang menunggu';
        } else {
            showToast(data.message || 'Gagal mengambil data', 'error');
        }
    } catch (error) {
        console.error('Error load verif:', error);
    }
  }

  function populatePetaniDropdown() {
    const select = document.getElementById('filter-petani');
    const uniquePetani = [...new Set(verifData.map(item => item.nama_petani))];
    let html = '<option value="all">Semua Petani</option>';
    uniquePetani.forEach(nama => {
      if (nama) html += `<option value="${nama}">${nama}</option>`;
    });
    const prevVal = select.value;
    select.innerHTML = html;
    if (uniquePetani.includes(prevVal) || prevVal === 'all') select.value = prevVal;
  }

  function renderTable(filter = 'all') {
    let dbFilter = filter === 'approved' ? 'verified' : filter;
    const filterPetani = document.getElementById('filter-petani').value;
    const filterBulan = document.getElementById('filter-bulan').value;
    
    const rows = verifData.filter(r => {
        let matchStatus = dbFilter === 'all' || r.status === dbFilter;
        let matchPetani = filterPetani === 'all' || r.nama_petani === filterPetani;
        let matchBulan = true;
        if (filterBulan && r.tanggal_panen) {
            const dateObj = new Date(r.tanggal_panen);
            const rowBulan = `${dateObj.getFullYear()}-${String(dateObj.getMonth()+1).padStart(2,'0')}`;
            matchBulan = rowBulan === filterBulan;
        }
        return matchStatus && matchPetani && matchBulan;
    });
    
    const tbody = document.getElementById('verif-tbody');
    if (!rows.length) {
      tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><i class="ti ti-inbox"></i><h3>Tidak ada data</h3><p>Tidak ada pengajuan dengan filter ini</p></div></td></tr>`;
      return;
    }
    tbody.innerHTML = rows.map((r, i) => {
      const tgl = new Date(r.tanggal_panen).toLocaleDateString('id-ID');
      return `
      <tr>
        <td style="font-family:monospace;font-size:.75rem;color:var(--text-light)">AGC-${r.id.toString().padStart(4, '0')}</td>
        <td><strong>${r.nama_petani}</strong></td>
        <td style="color:var(--text-mid)">${tgl}</td>
        <td>${r.komoditas}</td>
        <td><strong>${r.jumlah} ${r.satuan}</strong></td>
        <td>${statusBadge[r.status] || statusBadge['pending']}</td>
        <td>
          <div style="display:flex;gap:5px">
            <button class="action-btn" onclick="openVerif(${i})"><i class="ti ti-eye"></i> Detail</button>
            ${r.status === 'pending' ? `
            <button class="action-btn btn-approve" onclick="doApprove(${r.id})" title="Setujui"><i class="ti ti-check"></i></button>
            <button class="action-btn btn-reject"  onclick="openTolakModal(${r.id})" title="Tolak"><i class="ti ti-x"></i></button>
            ` : ''}
          </div>
        </td>
      </tr>
    `}).join('');
  }

  function openVerif(i) {
    const r = verifData[i];
    const isPending = r.status === 'pending';
    
    // Foto bukti panen
    const fotoHtml = r.foto 
        ? `<img src="http://localhost:3000/uploads/${r.foto}" alt="Bukti Panen" class="foto-panen" onclick="zoomFoto('http://localhost:3000/uploads/${r.foto}')">`
        : `<div class="photo-placeholder"><i class="ti ti-camera-off"></i><span style="font-size:.75rem">Tidak ada foto</span></div>`;

    // Catatan ketua (jika ditolak)
    const catatanHtml = r.status === 'rejected' && r.catatan_ketua
        ? `<div style="background:rgba(220,38,38,0.07);border:1.5px solid rgba(220,38,38,0.2);border-radius:10px;padding:12px 14px;margin-top:14px">
             <div style="font-size:.72rem;font-weight:700;color:var(--rose);margin-bottom:5px;display:flex;align-items:center;gap:5px"><i class="ti ti-message-circle"></i> Catatan Penolakan</div>
             <div style="font-size:.85rem;color:var(--text-dark);line-height:1.5">${r.catatan_ketua}</div>
           </div>` : '';
        
    document.getElementById('modal-verif-body').innerHTML = `
      <div class="quick-info" style="grid-template-columns:1fr 1fr;margin-bottom:16px">
        <div class="qi-item"><div class="qi-label">ID Pengajuan</div><div class="qi-val" style="font-family:monospace">AGC-${r.id.toString().padStart(4, '0')}</div></div>
        <div class="qi-item"><div class="qi-label">Petani</div><div class="qi-val">${r.nama_petani}</div></div>
        <div class="qi-item"><div class="qi-label">Komoditas</div><div class="qi-val">${r.komoditas}</div></div>
        <div class="qi-item"><div class="qi-label">Jumlah</div><div class="qi-val">${r.jumlah} ${r.satuan}</div></div>
        <div class="qi-item"><div class="qi-label">Lokasi</div><div class="qi-val">${r.lokasi}</div></div>
        <div class="qi-item"><div class="qi-label">Luas Lahan</div><div class="qi-val">${r.luas ? r.luas + ' Ha' : '-'}</div></div>
        <div class="qi-item"><div class="qi-label">Cuaca</div><div class="qi-val">${r.cuaca || '-'}</div></div>
        <div class="qi-item"><div class="qi-label">Kualitas</div><div class="qi-val">${r.kualitas || '-'}</div></div>
      </div>

      <div style="margin-bottom:14px">
        <div style="font-size:.79rem;font-weight:600;color:var(--text-mid);margin-bottom:8px;display:flex;align-items:center;gap:5px">
          <i class="ti ti-camera" style="color:var(--leaf)"></i> Foto Bukti Panen
          ${r.foto ? '<span style="font-size:.7rem;color:var(--text-light);margin-left:4px">(Klik untuk perbesar)</span>' : ''}
        </div>
        ${fotoHtml}
      </div>

      ${r.catatan ? `
      <div style="background:var(--cream);border-radius:10px;padding:12px 14px;margin-bottom:14px;border:1px solid var(--border)">
        <div style="font-size:.72rem;color:var(--text-light);margin-bottom:4px;display:flex;align-items:center;gap:4px"><i class="ti ti-notes" style="font-size:13px"></i> Catatan Petani</div>
        <div style="font-size:.84rem;color:var(--text-dark)">${r.catatan}</div>
      </div>
      ` : ''}

      ${catatanHtml}

      ${isPending ? `
      <div class="verif-action-bar" style="margin-top:16px">
        <button class="btn btn-sm btn-approve" onclick="doApprove(${r.id}); closeModal('modal-verif')">
          <i class="ti ti-circle-check"></i> Setujui Panen
        </button>
        <button class="btn btn-sm btn-reject" onclick="openTolakModal(${r.id}); closeModal('modal-verif')">
          <i class="ti ti-circle-x"></i> Tolak dengan Catatan
        </button>
      </div>
      ` : `
      <div style="display:flex;align-items:center;gap:8px;margin-top:12px">
        <span style="font-size:.78rem;color:var(--text-light)">Status:</span>
        ${statusBadge[r.status]}
      </div>
      `}
    `;
    openModal('modal-verif');
  }

  function zoomFoto(url) {
    document.getElementById('zoom-foto').src = url;
    openModal('modal-foto');
  }

  // === MODAL TOLAK ===
  function openTolakModal(id) {
    pendingRejectId = id;
    document.getElementById('catatan-ketua-input').value = '';
    updateCharCount();
    openModal('modal-tolak');
  }

  function updateCharCount() {
    const val = document.getElementById('catatan-ketua-input').value;
    document.getElementById('char-count').textContent = val.length;
  }

  async function konfirmasiTolak() {
    const catatan = document.getElementById('catatan-ketua-input').value.trim();
    if (!catatan) {
        showToast('Harap isi catatan alasan penolakan', 'error');
        document.getElementById('catatan-ketua-input').focus();
        return;
    }
    if (catatan.length < 10) {
        showToast('Catatan terlalu singkat (minimal 10 karakter)', 'error');
        return;
    }
    await doAction(pendingRejectId, 'rejected', catatan);
    closeModal('modal-tolak');
  }

  // === APPROVE ===
  async function doApprove(id) {
    await doAction(id, 'verified', null);
  }

  async function doAction(id, status, catatan_ketua) {
    const token = localStorage.getItem('token');
    const btn = document.getElementById('btn-konfirmasi-tolak');
    if (btn) { btn.disabled = true; btn.innerHTML = '<i class="ti ti-loader ti-spin"></i> Memproses...'; }

    try {
        const response = await fetch(`http://localhost:3000/api/harvests/${id}/status`, {
            method: 'PUT',
            headers: { 
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ status, catatan_ketua })
        });
        
        const data = await response.json();
        
        if (response.ok) {
            showToast(data.message, 'success');
            closeModal('modal-verif');
            loadVerifData();
        } else {
            showToast(data.message || 'Gagal mengubah status', 'error');
        }
    } catch(err) {
        console.error('Error verifikasi:', err);
        showToast('Koneksi server gagal', 'error');
    } finally {
        if (btn) { btn.disabled = false; btn.innerHTML = '<i class="ti ti-circle-x"></i> Konfirmasi Tolak'; }
    }
  }

  initFilterBtns('.filter-btn', renderTable);
  loadVerifData();
</script>
</body>
</html>
